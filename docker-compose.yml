services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatbot-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@unsw.edu.au}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-unswcse2025}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=rag/key.json
      - HOST=0.0.0.0
      - PORT=5000
      - PYTHONUNBUFFERED=1 # Forces Python stdout/stderr to be unbuffered
      - PYTHONDONTWRITEBYTECODE=1 # Prevents .pyc files
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/rag/docs:/app/rag/docs
      - ./backend/rag/vector_store:/app/rag/vector_store
      - ./backend/rag/key.json:/app/rag/key.json
    networks:
      - chatbot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/admin/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatbot-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - chatbot-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  chatbot-network:
    driver: bridge

volumes:
  backend_logs:
  vector_store:
  docs:
